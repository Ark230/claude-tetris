<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <label class="theme-switch" title="Cambiar tema">
    <input type="checkbox" id="theme-toggle" aria-label="Cambiar entre modo claro y modo oscuro" />
    <span class="switch-track">
      <span class="icon sun" aria-hidden="true">&#9728;</span>
      <span class="icon moon" aria-hidden="true">&#9789;</span>
      <span class="switch-thumb"></span>
    </span>
  </label>

  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select" aria-label="Seleccionar apariencia visual">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">POWER-UPS</span>
          <ul class="powerups">
            <li id="pu-bomba" class="pu-empty"><kbd>1</kbd> 💣 Bomba <span class="pu-count" id="pu-bomba-count">0</span></li>
            <li id="pu-rayo" class="pu-empty"><kbd>2</kbd> ⚡ Rayo <span class="pu-count" id="pu-rayo-count">0</span></li>
            <li id="pu-tinte" class="pu-empty"><kbd>3</kbd> 🎨 Tinte <span class="pu-count" id="pu-tinte-count">0</span></li>
            <li id="pu-gravedad" class="pu-empty"><kbd>4</kbd> 🪨 Gravedad <span class="pu-count" id="pu-gravedad-count">0</span></li>
            <li id="pu-congelar" class="pu-empty"><kbd>5</kbd> ❄️ Congelar <span class="pu-count" id="pu-congelar-count">0</span></li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
            <li><kbd>1</kbd>–<kbd>5</kbd> power-ups</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
